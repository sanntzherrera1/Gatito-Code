<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Gatito Code - Presentacion</title>
  <link rel="stylesheet" href="css/presentation.css">
</head>
<body>
  <div id="presentation-container">
    <!-- Slides inyectadas por JS -->
    
    <div id="nav-ui">
      <button class="nav-btn" id="btn-prev">◄</button>
      <div id="slide-counter-display"><span id="slide-counter">1</span><span class="sep">/</span><span>7</span></div>
      <button class="nav-btn" id="btn-next">►</button>
    </div>

    <!-- Elementos de transicion -->
    <div id="transition-curtain">
      <canvas id="transition-canvas"></canvas>
    </div>
  </div>

  <!-- Overlays globales: scanlines + vignette -->
  <div id="scanlines-overlay"></div>
  <div id="vignette-overlay"></div>

  <!-- Phaser para la demo interactiva -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <!-- Logica de la app -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
