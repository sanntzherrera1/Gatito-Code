<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gatito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="stylesheet" href="css/jump-picker.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/dialog.css">
    <link rel="stylesheet" href="css/name-dialog.css">
    <link rel="stylesheet" href="css/result.css">
  </head>
  <body class="app-loading">
    <div id="boot-splash" aria-live="polite">
      <div class="boot-card">
        <div class="boot-badge" aria-hidden="true"></div>
        <div class="boot-kicker">Cargando aventura</div>
        <h1 class="boot-title">Gatito Code</h1>
        <p class="boot-copy">Preparando niveles, objetos y musica del menu.</p>
        <div class="boot-progress-shell">
          <div class="boot-progress-bar" id="boot-progress-bar"></div>
        </div>
        <div class="boot-progress-meta">
          <span id="boot-progress-label">0%</span>
          <span id="boot-progress-status">Despertando gatito...</span>
        </div>
      </div>
    </div>
    <div id="game-frame"></div>

    <div id="hud"><div><b>Gatito</b> · <kbd>Esc</kbd> back to menu</div></div>

    <div id="panels">
      <div class="sprout-panel" id="dirs">
        <div class="panel-header">
          <h3>Movement</h3>
          <div class="target-switch" id="target-switch" title="Switch target: Program or Funcion 1">
            <button class="target-opt active" data-target="main">Program</button>
            <button class="target-opt" data-target="func1">F1</button>
            <button class="target-opt" data-target="for">FOR</button>
          </div>
        </div>
        <button data-dir="up"><span class="dir-icon">▲</span><span class="dir-label">move up</span></button>
        <button data-dir="down"><span class="dir-icon">▼</span><span class="dir-label">move down</span></button>
        <button data-dir="left"><span class="dir-icon">◀</span><span class="dir-label">move left</span></button>
        <button data-dir="right"><span class="dir-icon">▶</span><span class="dir-label">move right</span></button>
        <button data-dir="func1"><span class="dir-icon" style="color:#1a4a7a; font-style: italic; font-weight: 900; font-family: serif; text-shadow: 0.5px 0 0 #1a4a7a, -0.5px 0 0 #1a4a7a;">ƒ</span><span class="dir-label" style="color:#1a4a7a">FUNCTION 1</span></button>
        <button data-dir="for"><span class="dir-icon for-icon">FOR</span><span class="dir-label for-label">REPETIR</span></button>
        <!-- Boton JUMP retirado del panel de movimientos: el salto se reimplementara
             mediante el comando IF (saltar). El picker (jump-picker.js / jump-picker.css)
             se conserva por si se reutiliza. -->
        <!--
        <button data-dir="jump" id="jump-btn"><span class="dir-icon" style="color:#1a4a7a">⏺</span><span class="dir-label">jump</span></button>
        <div id="jump-dpad" class="jump-dpad">
          <button data-jdir="up" class="jump-dir-btn" aria-label="Jump up"><span class="dir-icon">▲</span></button>
          <button data-jdir="left" class="jump-dir-btn" aria-label="Jump left"><span class="dir-icon">◀</span></button>
          <button data-jdir="none" class="jump-dir-btn" aria-label="Jump in place"><span class="dir-icon">⏺</span></button>
          <button data-jdir="down" class="jump-dir-btn" aria-label="Jump down"><span class="dir-icon">▼</span></button>
          <button data-jdir="right" class="jump-dir-btn" aria-label="Jump right"><span class="dir-icon">▶</span></button>
        </div>
        -->
      </div>
    </div>

    <div id="right-panels">
      <div class="sprout-panel" id="queue">
        <h3>Program (max 5)</h3>
        <div class="slots" id="slots">
          <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
        </div>
        <button id="run" class="run"><span class="queue-icon">✓</span><span class="queue-label">ejecutar</span></button>
        <button id="clear" class="clear"><span class="queue-icon">✕</span><span class="queue-label">borrar</span></button>
        <button id="restart"><span class="queue-icon">↺</span><span class="queue-label">reiniciar</span></button>
      </div>

      <div class="sprout-panel panel-plegable" id="queue-func1">
        <button class="panel-toggle" type="button" data-toggle-panel="queue-func1" aria-expanded="true" aria-controls="queue-func1-content">
          <span>FUNCION 1</span>
          <span class="panel-toggle-icon">&#9662;</span>
        </button>
        <div class="panel-cuerpo" id="queue-func1-content">
        <div class="slots f1-slots" id="slots-func1" style="margin-bottom: 12px; gap: 8px;">
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
        </div>
        <button id="clear-func1" class="clear" style="margin-top: 10px;"><span class="queue-icon">✕</span><span class="queue-label">BORRAR F1</span></button>
        </div>
      </div>

      <div class="sprout-panel panel-plegable" id="queue-for">
        <button class="panel-toggle" type="button" data-toggle-panel="queue-for" aria-expanded="true" aria-controls="queue-for-content">
          <span>FOR</span>
          <span class="panel-toggle-icon">▾</span>
        </button>
        <div class="panel-cuerpo" id="queue-for-content">
          <label class="if-select-label" for="for-count-select">Repetir</label>
          <select id="for-count-select" class="if-select">
            <option value="2">2 veces</option>
            <option value="3">3 veces</option>
            <option value="4">4 veces</option>
            <option value="5">5 veces</option>
          </select>
          <div class="slots f1-slots" id="slots-for" style="margin-bottom: 12px; gap: 8px;">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
          </div>
          <button id="clear-for" class="clear" style="margin-top: 10px;"><span class="queue-icon">✕</span><span class="queue-label">BORRAR FOR</span></button>
        </div>
      </div>

      <div class="sprout-panel panel-plegable" id="queue-if-rule">
        <button class="panel-toggle" type="button" data-toggle-panel="queue-if-rule" aria-expanded="true" aria-controls="queue-if-content">
          <span>SI</span>
          <span class="panel-toggle-icon">▾</span>
        </button>
        <div class="panel-cuerpo" id="queue-if-content">
          <label class="if-select-label" for="if-condition-select">Si pasa</label>
          <select id="if-condition-select" class="if-select">
            <option value="">sin condicion</option>
            <option value="rock-ahead">roca adelante</option>
            <option value="tree-ahead">arbol adelante</option>
          </select>
          <label class="if-select-label" for="if-action-select">Hacer esto</label>
          <select id="if-action-select" class="if-select">
            <option value="">sin accion</option>
            <option value="jump">saltar</option>
            <option value="cut">cortar</option>
          </select>
          <div class="if-rule-sep"></div>
          <label class="if-select-label" for="if-condition-select-2">Y si pasa</label>
          <select id="if-condition-select-2" class="if-select">
            <option value="">sin condicion</option>
            <option value="rock-ahead">roca adelante</option>
            <option value="tree-ahead">arbol adelante</option>
          </select>
          <label class="if-select-label" for="if-action-select-2">Hacer esto</label>
          <select id="if-action-select-2" class="if-select">
            <option value="">sin accion</option>
            <option value="jump">saltar</option>
            <option value="cut">cortar</option>
          </select>
        </div>
      </div>
    </div>

    <div id="slot-trash-zone" class="slot-trash-zone">🗑️</div>
    <div id="level-dialog">
      <div id="level-dialog-box">
        <div id="level-dialog-portrait"></div>
        <div id="level-dialog-text"></div>
        <button id="level-dialog-btn">
          <span id="level-dialog-btn-icon">✓</span>
          <span>continuar</span>
        </button>
      </div>
    </div>


    <div id="name-dialog">
      <div id="name-dialog-box">
        <h3>Nuevo nivel</h3>
        <input id="name-dialog-input" type="text" maxlength="30" placeholder="Nombre del nivel…" autocomplete="off" />
        <div id="name-dialog-actions">
          <button id="name-dialog-cancel">Cancelar</button>
          <button id="name-dialog-confirm" class="confirm">Crear</button>
        </div>
      </div>
    </div>

    <div id="editor-panel">
      <div class="ed-header">
        <div class="ed-header-title">
          <h3 id="ed-title">Editor</h3>
          <div class="ed-status" id="ed-status">
            <span class="ed-status-dot" id="ed-status-dot"></span>
            <span id="ed-status-text">—</span>
            <span class="empty" id="ed-sel-text">Sin seleccion</span>
            <span class="empty" id="ed-hover-text">—</span>
          </div>
        </div>
      </div>

      <div class="ed-col-toggle" id="ed-col-toggle">
        <button data-col="tools"><span class="ed-col-arrow">❮</span> 🔧 Herramientas</button>
        <button data-col="palette">🎨 Paleta <span class="ed-col-arrow">❯</span></button>
      </div>

      <div class="ed-columns">
        <div class="ed-col ed-col-tools">
          <div class="ed-section">
            <h3>Nivel</h3>
            <div id="ed-summary" class="ed-summary">
              <span>Pickups: <b id="ed-sum-pickups">0</b></span>
              <span>Objetos: <b id="ed-sum-objetos">0</b></span>
              <span>Spawn: <b id="ed-sum-spawn">✓</b></span>
            </div>
          </div>

          <div class="ed-section">
            <h3>Historial</h3>
            <div id="ed-toolbar" class="ed-toolbar">
              <button id="ed-tool-undo" title="Deshacer (Ctrl+Z)"><span class="ed-btn-glyph">↶</span></button>
              <button id="ed-tool-redo" title="Rehacer (Ctrl+Y)"><span class="ed-btn-glyph">↷</span></button>
            </div>
          </div>

          <div class="ed-section">
            <div class="ed-section-title-row">
              <h3>Capa</h3>
              <button id="ed-clear" class="ed-section-title-btn" title="Limpiar capa actual">✕ Limpiar</button>
            </div>
            <div class="ed-layers" id="ed-layers">
              <button data-layer="floor"><span class="ed-layer-num">1</span><span>Floor</span></button>
              <button data-layer="walls" class="active"><span class="ed-layer-num">2</span><span>Walls</span></button>
              <button data-layer="path"><span class="ed-layer-num">3</span><span>Path</span></button>
              <button data-layer="overlay"><span class="ed-layer-num">4</span><span>Overlay</span></button>
              <button data-layer="top"><span class="ed-layer-num">5</span><span>Top</span></button>
            </div>
          </div>

          <div class="ed-section">
            <h3>Modos</h3>
            <div class="ed-modes">
              <button id="ed-spawn"><span class="ed-btn-glyph">◉</span> Spawn S</button>
              <button id="ed-intro-mode"><span class="ed-btn-glyph">▸</span> Intro I</button>
            </div>
          </div>

          <div class="ed-section">
            <h3>Acciones</h3>
            <div class="ed-actions">
              <button class="save" id="ed-save"><span class="ui-icon ui-icon-star dark"></span> Guardar </button>
              <button id="ed-play"><span class="ui-icon ui-icon-joystick dark"></span> Probar</button>
              <button id="ed-revert"><span class="ed-btn-glyph">↶</span> Revertir </button>
              <button class="menu" id="ed-menu"><span class="ui-icon ui-icon-house dark"></span> Menu </button>
            </div>
          </div>
        </div>

        <div class="ed-col ed-col-palette">
          <div id="ed-main-tabs-bar">
            <button data-tab="assets">ASSETS</button>
            <button data-tab="weather">CLIMA</button>
          </div>
          <div id="ed-assets-panel" class="ed-main-panel">
            <div id="ed-tab-content">
              <div id="ed-tileset-panel" class="ed-asset-tree active">
                <div class="ed-tree-root open active" data-tree-node="tileset-root" role="tree" aria-label="Tileset">
                  <button class="ed-tree-header" type="button" aria-expanded="true" role="treeitem" aria-level="1">
                    <span class="ed-tree-header-label"><span>Tileset</span></span>
                    <span class="ed-tree-arrow" aria-hidden="true"></span>
                  </button>
                  <div class="ed-tree-body" id="ed-tileset-tree" role="group"></div>
                </div>
              </div>
              <div id="ed-objects-panel" class="ed-asset-tree">
                <div class="ed-tree-root open" data-tree-node="objects-root" role="tree" aria-label="Objetos">
                  <button class="ed-tree-header" type="button" aria-expanded="true" role="treeitem" aria-level="1">
                    <span class="ed-tree-header-label"><span>Objetos</span></span>
                    <span class="ed-tree-arrow" aria-hidden="true"></span>
                  </button>
                  <div class="ed-tree-body" id="ed-objects-tree" role="group"></div>
                </div>
              </div>
            </div>

            <div id="ed-palette-container">
              <div class="ed-variant-switches" id="ed-variant-switches"></div>
              <div class="ed-palette" id="ed-palette"></div>
              <div class="ed-autotile-row" id="ed-autotile-row" style="display:none;">
                <button id="ed-autotile-btn">
                  <span class="ui-icon ui-icon-sun"></span>
                  <span>Auto</span>
                </button>
              </div>
              <div class="ed-obj-type" id="ed-obj-type">
                <span class="ed-obj-type-label">Tipo:</span>
                <button data-objtype="pickup_with_animation">Pickup anim</button>
                <button data-objtype="pickup">Pickup</button>
                <button data-objtype="deco">Deco</button>
                <button data-objtype="top">Top</button>
                <label class="ed-obj-solid" id="ed-obj-solid" title="El objeto bloquea el paso del jugador">
                  <input type="checkbox" id="ed-obj-solid-cb"> Sólido
                </label>
              </div>
            </div>
          </div>
          <div id="ed-weather-panel" class="ed-main-panel">
            <div class="ed-section">
              <div class="ed-wx-list" id="ed-weather-list"></div>
            </div>
          </div>
        </div>
        </div>
    </div>

    <div id="ed-toast" class="ed-toast"></div>

    <div id="ed-modal" class="ed-modal">
      <div class="ed-modal-box">
        <p id="ed-modal-text"></p>
        <div class="ed-modal-actions">
          <button id="ed-modal-cancel">Cancelar</button>
          <button id="ed-modal-confirm" class="confirm">Confirmar</button>
        </div>
      </div>
    </div>

    <div id="ed-layer-picker" class="ed-layer-picker"></div>

    <div id="ed-tile-hover-preview" class="ed-tile-hover-preview"></div>

    <div id="result-panel">
      <div class="result-portrait" id="result-portrait"></div>
      <div class="result-bubble">
        <div class="result-message" id="result-message"></div>
        <div class="result-actions" id="result-actions"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="./src/ui/index.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
